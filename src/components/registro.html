<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario | Level-Up Gamer</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <a href="../../index.html" class="logo-container">
                <img src="../assets/Logo.png" alt="Level-Up Gamer Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/70x70/101026/ffffff?text=Logo'">
                <span class="logo-text">LEVEL-UP GAMER</span>
            </a>

            <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <nav class="nav-menu" id="nav-menu">
                <a href="../../index.html" class="btn-nav">Home</a>
                <a href="productos.html" class="btn-nav">Productos</a>
                <a href="nosotros.html" class="btn-nav">Nosotros</a>
                <a href="blogs.html" class="btn-nav">Blogs</a>
                <a href="contacto.html" class="btn-nav">Contacto</a>
                <a href="registro.html" class="btn-nav signup active">Registrarse</a>
                <a href="#" class="btn-nav cart-widget" style="border: none; background: transparent; box-shadow: none;">
                    🛒 Carrito (<span id="cart-count">0</span>)
                </a>
            </nav>
        </div>
    </header>

    <main class="main-content flex-center">
        <section class="form-container">
            <h2>CREAR CUENTA GAMER</h2>
            <p class="form-subtitle">Regístrate para obtener beneficios y descuentos exclusivos.</p>

            <form id="form-registro" novalidate>
                <div class="form-group">
                    <label for="username">Nombre de Usuario *</label>
                    <input type="text" id="username" name="username" placeholder="Ej: PlayerOne">
                    <small class="error-message" id="error-username"></small>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico *</label>
                    <input type="email" id="email" name="email" placeholder="nombre@inacap.cl / gmail.com">
                    <small class="error-message" id="error-email"></small>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña *</label>
                    <input type="password" id="password" name="password" placeholder="********">
                    <small class="error-message" id="error-password"></small>
                </div>

                <div class="form-group">
                    <label for="fecha-nacimiento">Fecha de Nacimiento *</label>
                    <input type="date" id="fecha-nacimiento" name="fecha-nacimiento">
                    <small class="error-message" id="error-fecha"></small>
                </div>

                <div class="form-group">
                    <label for="region">Región *</label>
                    <select id="region" name="region">
                        <option value="">Seleccione una región</option>
                    </select>
                    <small class="error-message" id="error-region"></small>
                </div>

                <div class="form-group">
                    <label for="comuna">Comuna *</label>
                    <select id="comuna" name="comuna" disabled>
                        <option value="">Seleccione primero una región</option>
                    </select>
                    <small class="error-message" id="error-comuna"></small>
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección de Despacho *</label>
                    <input type="text" id="direccion" name="direccion" placeholder="Calle, número, departamento...">
                    <small class="error-message" id="error-direccion"></small>
                </div>

                <button type="submit" class="btn-submit">REGISTRARSE</button>
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Level-Up Gamer. Todos los derechos reservados. Desarrollado para Evaluación Web.</p>
    </footer>

    <script src="../js/comunas.js"></script>
    <script src="../js/validaciones.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
