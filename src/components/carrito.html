<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Carrito - Level-Up Gamer</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/tienda.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <a href="../../index.html" class="logo-container">
                <img src="../assets/Logo.png" alt="Level-Up Gamer Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/70x70/101026/ffffff?text=Logo'">
                <span class="logo-text"></span>
            </a>

            <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <nav class="nav-menu" id="nav-menu">
                <a href="../../index.html" class="btn-nav">Home</a>
                <a href="productos.html" class="btn-nav">Productos</a>
                <a href="nosotros.html" class="btn-nav">Nosotros</a>
                <a href="blogs.html" class="btn-nav">Blogs</a>
                <a href="contacto.html" class="btn-nav">Contacto</a>
                <a href="registro.html" class="btn-nav signup">Registrarse</a>
                <a href="login.html" class="btn-nav">Iniciar Sesión</a>
                
                <a href="carrito.html" class="cart-widget">
                    🛒 Carrito (<span id="cart-count">0</span>)
                </a>
                <div id="user-profile-container" class="profile-dropdown-container"></div>
            </nav>
        </div>
    </header>

    <main class="carrito-page-container">
        <h1 class="carrito-title">TU <span class="neon-blue">INVENTARIO</span></h1>

        <div class="carrito-grid">
            <section class="carrito-items-section">
                <div id="cart-vacio" class="cart-empty-msg" style="display: none;">
                    <p>No tienes productos en tu inventario de compra.</p>
                    <a href="productos.html" class="btn-continuar">Explorar Productos</a>
                </div>
                <div id="cart-items-page-list"></div>
            </section>

            <aside class="carrito-summary-section">
                <div class="summary-card">
                    <h3>RESUMEN DEL PEDIDO</h3>
                    <hr class="summary-divider">
                    <div class="summary-row">
                        <span>Subtotal (<span id="total-articulos">0</span> items)</span>
                        <span id="subtotal-precio">$0</span>
                    </div>
                    <div class="summary-row">
                        <span>Envío</span>
                        <span class="muted-text">Por calcular</span>
                    </div>
                    
                    <div class="summary-row" id="row-descuento-duoc" style="display: none; color: #39FF14;">
                        <span>Descuento Duoc (20%)</span>
                        <span id="descuento-duoc-precio">-$0</span>
                    </div>

                    <hr class="summary-divider">
                    <div class="summary-row total-row">
                        <strong>Total</strong>
                        <strong id="precio-total" class="neon-price">$0</strong>
                    </div>
                    <!-- Busca tu botón actual de IR A PAGAR y añade el atributo onclick -->
                    <button onclick="procesarCheckoutPlataforma()" class="btn-checkout" style="width: 100%; background: #0099ff; color: white; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">
                        IR A PAGAR →
                    </button>
                    <a href="productos.html" class="link-back">Continuar comprando</a>
                </div>
            </aside>
        </div>
    </main>

    <!-- CONTENEDOR ÚNICO: JavaScript se encargará de renderizar la grilla simétrica aquí -->
    <footer id="global-footer" class="main-footer"></footer>
    
    <script src="../js/productos.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/main.js"></script>
    <!-- Botón Flotante de Soporte Técnico vía WhatsApp en Contacto -->
</body>
</html>
